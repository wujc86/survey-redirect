<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進入施測系統...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; margin: 0; }
        .loading-box { text-align: center; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="loading-box">
    <div class="loader"></div>
    <h3>正在為您分配試卷，請稍候...</h3>
    <p style="color: #666;">如果頁面沒有自動跳轉，請 <a id="manual-link" href="#">點擊此處</a></p>
</div>

<script>
    // 您的試卷連結
    const surveyA = "https://naer.surveycake.biz/s/we80O";
    const surveyB = "https://naer.surveycake.biz/s/v2xw6";

    function assignSurvey() {
        // 【完全隨機邏輯】
        // 每次載入頁面時，直接生成 0~1 之間的隨機數
        // 不讀取也不寫入任何瀏覽器紀錄 (localStorage/sessionStorage)
        const assigned = Math.random() < 0.5 ? 'A' : 'B';

        const targetUrl = (assigned === 'A') ? surveyA : surveyB;
        
        // 更新手動連結（備援用）
        document.getElementById('manual-link').href = targetUrl;

        // 執行跳轉：使用 replace 確保使用者按「回上一頁」時，
        // 不會卡在「正在分配」的轉圈圈畫面，而是會直接跳過它。
        window.location.replace(targetUrl);
    }

    // 進入網頁立即執行
    assignSurvey();
</script>

</body>
</html>
